name: Release

# Publishes the package to the npm registry whenever a version tag
# (e.g. `v1.2.3`) is pushed. The tag version MUST match the version
# declared in package.json, otherwise the job fails fast.
#
# Setup required in the repository:
#   1. npm automation access token (recommended, "Automation" type or a
#      fine-grained token with publish permission) stored as the secret
#      `NPM_TOKEN` (Settings -> Secrets and variables -> Actions).
#   2. The package is published as public (`publishConfig.access: public`
#      in package.json), so no first-time manual publish is required.
#
# To cut a release locally:
#   git tag v1.2.3
#   git push origin v1.2.3

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 15

    permissions:
      contents: write # to create the GitHub release
      id-token: write # to enable npm provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME#v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          echo "Tag version:   $TAG"
          echo "Package version: $PKG_VERSION"
          if [ "$TAG" != "$PKG_VERSION" ]; then
            echo "::error::Tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm check

      - name: Build
        run: pnpm build

      - name: Publish to npm
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build npm package tarball
        run: npm pack

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: See [CHANGELOG.md](./CHANGELOG.md) for the list of
            changes.
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
          files: mcp-compress-router-*.tgz
