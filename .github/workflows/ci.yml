name: CI

# Runs the full quality gate (format, lint, typecheck, tests) on every
# push to the main branch and on pull requests, so a broken change can
# never reach a release tag.

on:
  push:
    branches:
      - master
      - main
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on PRs (never on tag pushes, which drive releases).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gates
        run: pnpm check

      - name: Build
        run: pnpm build
